<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="560" viewBox="0 0 1600 560" role="img" aria-labelledby="title desc">
  <title id="title">Schrodinger Cat Quantum Systems Banner</title>
  <desc id="desc">A stylized Schrodinger cat inside a quantum laboratory box with wave functions, spin symbols, and measurement motifs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#102a43"/>
      <stop offset="1" stop-color="#09151f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity="0.58"/>
      <stop offset="0.55" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="560" fill="url(#bg)"/>
  <circle cx="1130" cy="250" r="290" fill="url(#glow)"/>
  <g opacity="0.12" stroke="#d8f3ff" stroke-width="2" fill="none">
    <path d="M0 440 C 210 360, 310 500, 510 420 S 910 345, 1110 420 1430 490, 1600 395"/>
    <path d="M0 130 C 240 240, 360 70, 575 160 S 940 270, 1180 150 1440 80, 1600 160"/>
  </g>
  <g opacity="0.28" fill="#c7f9ff" font-family="Georgia, serif">
    <text x="88" y="102" font-size="34">|psi&gt; = alpha|alive&gt; + beta|not measured&gt;</text>
    <text x="1030" y="94" font-size="42">I = 3/2</text>
    <text x="1180" y="468" font-size="30">rho(t) = U rho U* + D[rho]</text>
    <text x="96" y="492" font-size="30">control -> measure -> identify -> update</text>
  </g>
  <g transform="translate(610 90)">
    <path d="M95 62 H650 Q690 62 706 102 L770 262 Q788 309 750 346 L650 444 Q624 470 585 470 H142 Q102 470 82 434 L4 291 Q-17 253 10 217 L78 92 Q95 62 135 62 Z" fill="#0b1725" stroke="#7dd3fc" stroke-width="5"/>
    <path d="M86 73 L225 202 H726" stroke="#7dd3fc" stroke-width="3" opacity="0.5"/>
    <path d="M16 242 H759" stroke="#7dd3fc" stroke-width="3" opacity="0.35"/>
    <path d="M222 202 L139 468" stroke="#7dd3fc" stroke-width="3" opacity="0.35"/>
    <circle cx="640" cy="142" r="28" fill="#ef4444" opacity="0.85" filter="url(#softGlow)"/>
    <circle cx="640" cy="142" r="9" fill="#fee2e2"/>
    <path d="M608 142 H535" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
    <text x="525" y="132" fill="#fca5a5" font-size="28" font-family="Georgia, serif">detector</text>
  </g>
  <g transform="translate(770 195)">
    <ellipse cx="220" cy="190" rx="210" ry="118" fill="#d7cab0"/>
    <path d="M84 120 C55 56, 110 35, 150 88" fill="#d7cab0"/>
    <path d="M315 90 C360 35, 417 58, 360 132" fill="#d7cab0"/>
    <path d="M107 115 C88 68, 122 61, 145 96" fill="#263238"/>
    <path d="M322 98 C350 64, 377 73, 354 119" fill="#263238"/>
    <ellipse cx="170" cy="170" rx="22" ry="17" fill="#07111f"/>
    <ellipse cx="270" cy="170" rx="22" ry="17" fill="#07111f"/>
    <circle cx="178" cy="164" r="5" fill="#e0f2fe"/>
    <circle cx="278" cy="164" r="5" fill="#e0f2fe"/>
    <path d="M216 190 Q226 200 236 190" stroke="#07111f" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M226 202 C202 222, 178 221, 158 210" stroke="#07111f" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M226 202 C252 223, 280 222, 302 209" stroke="#07111f" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M76 220 C20 235, 10 285, 48 320 C95 360, 160 321, 205 292" stroke="#d7cab0" stroke-width="42" fill="none" stroke-linecap="round"/>
    <path d="M420 192 C504 170, 528 250, 456 282" stroke="#d7cab0" stroke-width="38" fill="none" stroke-linecap="round"/>
    <g stroke="#07111f" stroke-width="3" stroke-linecap="round" opacity="0.85">
      <path d="M138 195 H70"/>
      <path d="M140 210 H66"/>
      <path d="M306 195 H380"/>
      <path d="M304 210 H382"/>
    </g>
  </g>
  <g fill="none" stroke="#fde68a" stroke-width="4" opacity="0.88" filter="url(#softGlow)">
    <path d="M210 285 C290 210, 385 365, 470 287 S655 215, 730 286"/>
    <path d="M1220 330 C1290 245, 1375 395, 1460 318"/>
