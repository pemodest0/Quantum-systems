  <g fill="#f8fafc">
    <text x="80" y="245" font-size="66" font-family="Georgia, serif" font-weight="700">Quantum Systems</text>
    <text x="84" y="305" font-size="30" font-family="Segoe UI, Arial, sans-serif" opacity="0.9">Open quantum control, dissipative dynamics, NMR, tomography, and noise spectroscopy</text>
  </g>
</svg>
