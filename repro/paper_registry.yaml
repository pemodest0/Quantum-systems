    purpose: "Implement a minimal optimal-control pseudo-pure-state preparation benchmark for a quadrupolar spin-3/2 system with a dephasing/gradient step and synthetic QST validation."
  - paper_id: projected_ls_qpt_2022
    type: paper_reproduction
