    purpose: "Implement a minimal GRAPE pulse-design benchmark for the Na-23 spin-3/2 platform and compare a robust optimized selective central-transition gate against a rectangular pulse."
  - paper_id: pps_optimal_control_2012
    type: paper_reproduction
    title: "Preparing Pseudo-Pure States in a Quadrupolar Spin System Using Optimal Control"
    citation: "Chinese Physics Letters 29(12), 127601, 2012, doi:10.1088/0256-307X/29/12/127601."
