    purpose: "Implement a projected least-squares QPT benchmark by projecting raw Choi least-squares estimates onto the CPTP set and comparing physicality and reconstruction error."
  - paper_id: gate_set_tomography_2021
    type: paper_reproduction
    title: "Gate Set Tomography"
