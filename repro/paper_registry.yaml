schema_version: 1
description: "Registry of papers, internal baselines, and reproduction targets."
papers:
  - paper_id: internal_validation_baseline
    type: internal_baseline
    title: "Internal spin-3/2 Na-23 validation baseline"
    citation: "Internal project validation target, not an external paper."
    status: active
    script: scripts/run_internal_validation_baseline.py
    output_dir: outputs/repro/internal_validation_baseline/latest
    purpose: "Validate spin operators, Hamiltonian scales, synthetic spectrum basics, and Liouvillian physical checks before reproducing external papers."
  - paper_id: na23_relaxometry_2023
    type: paper_reproduction
    title: "23Na relaxometry: An overview of theory and applications"
    citation: "Magnetic Resonance Letters, 2023, doi:10.1016/j.mrl.2023.04.001."
    status: active
    script: scripts/repro_na23_relaxometry_2023.py
    output_dir: outputs/repro/na23_relaxometry_2023/latest
    purpose: "Implement a minimal quadrupolar-relaxation benchmark for Na-23 and compare it against the current phenomenological biexponential envelope model."
  - paper_id: spin32_algebraic_2004
    type: paper_reproduction
    title: "Algebraic description of spin 3/2 dynamics in NMR experiments"
    citation: "Journal of Magnetic Resonance 173(2), 236-253, 2005, doi:10.1016/j.jmr.2004.12.009."
    status: active
    script: scripts/repro_spin32_algebraic_2004.py
    output_dir: outputs/repro/spin32_algebraic_2004/latest
    purpose: "Validate the spin-3/2 algebraic Liouville-space representation for RF pulses, free evolution, detection, coherence pathways, and B0/B1 sensitivity."
  - paper_id: qst_relaxation_2008
    type: paper_reproduction
    title: "A study of the relaxation dynamics in a quadrupolar NMR system using Quantum State Tomography"
    citation: "Journal of Magnetic Resonance, 2008, doi:10.1016/j.jmr.2008.01.009."
    status: active
    script: scripts/repro_qst_relaxation_2008.py
    output_dir: outputs/repro/qst_relaxation_2008/latest
    purpose: "Reproduce the QST relaxation-identification workflow with synthetic spin-3/2 trajectories, reconstructed density matrices, rate extraction, and noise/phase stress tests."
  - paper_id: spin32_qlogic_qst_2005
    type: paper_reproduction
    title: "Quantum logical operations for spin 3/2 quadrupolar nuclei monitored by quantum state tomography"
    citation: "Journal of Magnetic Resonance, 2005, doi:10.1016/j.jmr.2005.04.009."
    status: active
    script: scripts/repro_spin32_qlogic_qst_2005.py
    output_dir: outputs/repro/spin32_qlogic_qst_2005/latest
    purpose: "Benchmark selective spin-3/2 logical pulses with and without quadrupolar evolution during the pulse and monitor the resulting state by QST."
  - paper_id: nonmarkov_noise_2022
    type: paper_reproduction
    title: "Characterization and control of non-Markovian quantum noise"
    citation: "Nature Reviews Physics, 2022, doi:10.1038/s42254-022-00446-2."
    status: active
    script: scripts/repro_nonmarkov_noise_2022.py
    output_dir: outputs/repro/nonmarkov_noise_2022/latest
    purpose: "Define operational Markovian-vs-memory failure signatures for the project using dephasing, echo recovery, trace-distance revivals, and time-local negative-rate diagnostics."
  - paper_id: multipass_qpt_2024
    type: paper_reproduction
    title: "Multipass quantum process tomography"
    citation: "Scientific Reports 14, 18185, 2024, doi:10.1038/s41598-024-68353-3."
    status: active
    script: scripts/repro_multipass_qpt_2024.py
    output_dir: outputs/repro/multipass_qpt_2024/latest
    purpose: "Prototype one-qubit multipass QPT and compare single-pass vs repeated-process PTM reconstruction under synthetic SPAM, readout, and shot noise."
  - paper_id: quadrupolar_qip_2012
    type: paper_reproduction
    title: "Quantum information processing by nuclear magnetic resonance on quadrupolar nuclei"
    citation: "Philosophical Transactions of the Royal Society A 370, 4770-4793, 2012, doi:10.1098/rsta.2011.0365."
    status: active
    script: scripts/repro_quadrupolar_qip_2012.py
    output_dir: outputs/repro/quadrupolar_qip_2012/latest
    purpose: "Validate the encoded two-qubit interpretation of a spin-3/2 quadrupolar nucleus using product-operator decompositions, pseudo-pure states, a two-qubit Grover benchmark, and synthetic QST."
  - paper_id: grape_nmr_control_2005
    type: paper_reproduction
    title: "Optimal control of coupled spin dynamics: Design of NMR pulse sequences by gradient ascent algorithms"
    citation: "Journal of Magnetic Resonance 172(2), 296-305, 2005, doi:10.1016/j.jmr.2004.11.004."
    status: active
    script: scripts/repro_grape_nmr_control_2005.py
